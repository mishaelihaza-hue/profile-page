<main class="page">
<section class="container my-5 section">

<div class="section-head text-center">
    <p class="section-kicker">Get In Touch</p>
    <h1 class="section-title">Contact Me</h1>
</div>

<div class="row g-4 align-items-stretch mt-3">
    <div class="col-lg-5">
        <div class="form-card contact-info h-100">
            <h2 class="section-title mb-3">Contact Details</h2>
            <p class="contact-note">Reach me directly or send a message using the form.</p>

            <div class="contact-list">
                <p>
                    <span class="contact-label"><i class="bi bi-whatsapp nav-icon"></i>WhatsApp</span>
                    <a href="https://wa.me/2348058527928" class="contact-link">+234 805 852 7928</a>
                </p>
                <p>
                    <span class="contact-label"><i class="bi bi-telephone nav-icon"></i>Phone</span>
                    <a href="tel:+2348058527928" class="contact-link">08058527928</a>
                </p>
                <p>
                    <span class="contact-label"><i class="bi bi-geo-alt nav-icon"></i>Address</span>
                    <a href="https://www.google.com/maps/search/?api=1&query=Sideview%20Estate%20Phase%202%20Off%20Airport%20Voice%20of%20Nigeria" class="contact-link">
                        Sideview Estate Phase 2 off Airport Voice of Nigeria.
                    </a>
                </p>
            </div>

            <div class="contact-map mt-4">
                <iframe
                    title="Sideview Estate Phase 2 map"
                    src="https://www.google.com/maps?q=Sideview%20Estate%20Phase%202%20Off%20Airport%20Voice%20of%20Nigeria&output=embed"
                    loading="lazy"
                    referrerpolicy="no-referrer-when-downgrade"
                ></iframe>
            </div>
        </div>
    </div>

    <div class="col-lg-7">
        <div class="form-card h-100">
            <h2 class="section-title mb-3">Send a Message</h2>
            <form>

                <div class="mb-3">
                <label class="form-label">Name</label>
                <input type="text" class="form-control">
                </div>

                <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control">
                </div>

                <div class="mb-3">
                <label class="form-label">Message</label>
                <textarea class="form-control" rows="5"></textarea>
                </div>

                <button class="btn btn-primary w-100">Send Message</button>

            </form>
        </div>
    </div>
